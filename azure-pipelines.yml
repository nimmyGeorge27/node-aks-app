trigger:
- main

variables:
  imageName: node-app
  acrName: nimmyacr.azurecr.io
  dockerTag: $(Build.BuildId)

stages:

# ==================================
# STAGE 1 - BUILD & PUSH IMAGE
# ==================================
- stage: Build
  displayName: Build and Push Docker Image

  jobs:
  - job: Build
    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: self

    - task: UseNode@1
      inputs:
        version: '18.x'

    - script: |
        npm install
      displayName: Install Dependencies

    - script: |
        docker build -t $(acrName)/$(imageName):$(dockerTag) .
      displayName: Build Docker Image

    - task: AzureCLI@2
      displayName: Login to ACR
      inputs:
        azureSubscription: 'azure-aks-connection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name nimmyacr

    - script: |
        docker push $(acrName)/$(imageName):$(dockerTag)
      displayName: Push Docker Image


# ==================================
# STAGE 2 - UPDATE MANIFEST
# ==================================
- stage: UpdateManifest
  displayName: Update Kubernetes Manifest
  dependsOn: Build

  jobs:
  - job: UpdateManifest
    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: self
      persistCredentials: true
      fetchDepth: 0

    - script: |
        echo "Updating image tag in deployment.yaml"

        sed -i "s|image:.*|image: $(acrName)/$(imageName):$(dockerTag)|g" k8s/deployment.yaml

        echo "Updated deployment.yaml"

        cat k8s/deployment.yaml
      displayName: Update image tag using sed

    - script: |
        git config --global user.email "pipeline@azure.com"
        git config --global user.name "azure-pipeline"

        git add k8s/deployment.yaml

        git commit -m "[skip ci] Update image tag to $(dockerTag)" || echo "No changes to commit"

        git pull origin main --rebase || true

        git push origin HEAD:main
      displayName: Commit updated manifest

    